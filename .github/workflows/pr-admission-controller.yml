name: PR Admission Controller

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate"
        required: true
        type: number
      max_ready_per_stream:
        description: "Maximum ready PRs allowed per stream"
        required: false
        default: "1"
        type: string
      enforce:
        description: "Apply enforcement actions (manual override; non-blocking policy default)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-admission-controller-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  enforce-admission:
    name: PR Admission Signal (Advisory)
    runs-on: aragora
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        continue-on-error: true

      - name: Fallback to system Python
        if: steps.setup-python.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          echo "::warning::actions/setup-python failed — falling back to system Python"
          PY_BIN=""
          for cmd in python3.11 python3 python; do
            if command -v "$cmd" &>/dev/null; then
              PY_BIN="$(command -v "$cmd")"
              echo "Found $cmd: $("$cmd" --version)"
              break
            fi
          done
          if [[ -z "${PY_BIN}" ]]; then
            echo "::error::No Python interpreter found"
            exit 1
          fi

          sudo ln -sf "${PY_BIN}" /usr/local/bin/python
          sudo ln -sf "${PY_BIN}" /usr/local/bin/python3
          /usr/local/bin/python -m ensurepip --upgrade || true

          cat <<'EOF' | sudo tee /usr/local/bin/pip >/dev/null
          #!/usr/bin/env bash
          exec /usr/local/bin/python -m pip "$@"
          EOF
          sudo chmod +x /usr/local/bin/pip
          sudo ln -sf /usr/local/bin/pip /usr/local/bin/pip3

          python --version
          pip --version || /usr/local/bin/python -m pip --version

      - name: Resolve PR number
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate admission controller (advisory by default)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          MAX_READY="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_ready_per_stream || '1' }}"
          ENFORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.enforce }}" = "true" ]; then
              ENFORCE_FLAG="--enforce"
            fi
          fi

          set +e
          python3 scripts/pr_admission_controller.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ steps.resolve.outputs.pr_number }}" \
            --max-ready-per-stream "${MAX_READY}" \
            ${ENFORCE_FLAG}
          rc=$?
          if [ "${rc}" -ne 0 ]; then
            echo "::warning::Admission signal failed with exit code ${rc} (non-blocking)"
          fi
          exit 0
